  <!-- ============================================================
  NYX v4.20 — Quiz Structural Scroll Fix
  Causa raiz corrigida:
  1. touch-action:manipulation no body bloqueia pan-y no Android/Chrome
  2. v4.18 e v4.19 conflitam: data-stable-build é sobrescrito para v4.19,
     mas v4.18 ainda adiciona nyx-quiz-scroll-hard ao .keys,
     tornando as regras v4.18 inativas (selector body[data-stable-build*="v4.18"] não bate)
     enquanto .keys mantém a classe órfã
  3. v4.19 move o scroll para .app, fazendo o HUD rolar junto
  Abordagem v4.20:
  - .keys é o container de scroll correto (HUD fica fixo no grid)
  - body recebe nyx-quiz-body-420 como chave de ativação do CSS
  - touch-action:pan-y aplicado ao body + app + keys
  - #grid: display:block, height:auto, overflow:visible
  - Remove classes conflitantes de versões anteriores
  - quiz-hero-v413 e quiz-qa-panel-v414 suprimidos por CSS puro
  - Sem setTimeout frágeis no hot path de render
============================================================ -->
  <!-- ============================================================
  NYX v4.22 — Quiz Touch Scroll Fix
  Causa tratada:
  - O conteúdo do Quiz é quase todo formado por <button>.
  - Regras antigas aplicam touch-action: manipulation em button globalmente.
  - Em Android/Chrome via content:// isso pode impedir pan/scroll quando o gesto começa em cards/opções.
  Estratégia:
  - .keys volta a ser o scroller estável do Quiz.
  - Todos os botões internos do Quiz recebem touch-action: pan-y.
  - Fallback JS implementa rolagem manual em touchmove vertical dentro do Quiz.
============================================================ -->
