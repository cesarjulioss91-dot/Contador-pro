<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NYX v5.31 - Verificação</title><style>body{font-family:system-ui;background:#050814;color:#eef6ff;padding:18px}code{background:#111827;padding:2px 6px;border-radius:6px}.ok{color:#34d399}.bad{color:#fb7185}li{margin:8px 0}.box{border:1px solid rgba(103,232,249,.25);border-radius:14px;padding:12px;background:#07101f}</style></head><body><h1>NYX v5.31 - Verificação GitHub Pages</h1><p>Versão FLAT DIRECT: todos os arquivos ficam na raiz. Sem pasta assets, sem lazy loading e sem service worker ativo.</p><div class="box"><p>Se tudo aparecer como OK, abra a página principal. Se o app antigo continuar aparecendo, limpe os dados do site no Chrome.</p></div><ul id="out"></ul><script>const files=['index.html','00_style.css','01_style.css','02_style.css','03_style.css','04_style.css','05_style.css','06_style.css','07_style.css','08_style.css','09_lazy_modular.css','00_cache_reset_v531.js','00_home_stable_clicks.js','01_modular_core.js','02_script.js','10_quiz_bank_v23_data.js','12_quiz_hud.js','15_home_counter_modal.js','16_quiz_clean_auto_report.js','19_consultas_rapidas.js','manifest.webmanifest','sw.js','icon-192.png','icon-512.png'];const out=document.getElementById('out');Promise.all(files.map(f=>fetch(f+'?check='+Date.now(),{cache:'no-store'}).then(r=>({f,ok:r.ok,status:r.status})).catch(e=>({f,ok:false,status:'erro'})))).then(rs=>{out.innerHTML=rs.map(x=>`<li class="${x.ok?'ok':'bad'}">${x.ok?'OK':'FALHOU'} — <code>${x.f}</code> (${x.status})</li>`).join('');});</script></body></html>
