<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NYX - Verificação de arquivos</title><style>body{font-family:system-ui;background:#050814;color:#eef6ff;padding:18px}code{background:#111827;padding:2px 6px;border-radius:6px}.ok{color:#34d399}.bad{color:#fb7185}li{margin:8px 0}.box{border:1px solid rgba(103,232,249,.25);border-radius:14px;padding:12px;background:#07101f}</style></head><body><h1>NYX - Verificação GitHub Pages</h1><p>Versão FLAT: todos os arquivos ficam na raiz do repositório. Não precisa criar pasta assets.</p><div class="box"><p>Se tudo abaixo aparecer como OK, abra <code>index.html</code> ou a página principal do GitHub Pages.</p></div><ul id="out"></ul><script>const files=['index.html','00_style.css','01_style.css','09_lazy_modular.css','00_lazy_bootstrap.js','00_pwa_register.js','02_script.js','10_quiz_bank_v23_data.js','19_consultas_rapidas.js','manifest.webmanifest','sw.js','icon-192.png','icon-512.png'];const out=document.getElementById('out');Promise.all(files.map(f=>fetch(f,{cache:'no-store'}).then(r=>({f,ok:r.ok,status:r.status})).catch(e=>({f,ok:false,status:'erro'})))).then(rs=>{out.innerHTML=rs.map(x=>`<li class="${x.ok?'ok':'bad'}">${x.ok?'OK':'FALHOU'} — <code>${x.f}</code> (${x.status})</li>`).join('');});</script></body></html>
